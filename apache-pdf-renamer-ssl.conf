# Apache SSL VirtualHost Configuration for Research PDF File Renamer
# HTTPS/TLS with Let's Encrypt certificates
#
# Mozilla SSL Configuration Generator - Intermediate profile
# Supports: TLSv1.2, TLSv1.3 | Minimum client: Firefox 27, Android 4.4.2, Chrome 31,
#           Edge 12, IE 11, Java 8u31, OpenSSL 1.0.1, Opera 20, Safari 9
#
# INSTALLATION:
# 1. First, obtain a certificate using certbot (see docs/deployment.md)
# 2. Replace YOUR_DOMAIN with your actual domain name throughout this file
# 3. Copy this file to /etc/apache2/sites-available/pdf-renamer-ssl.conf
# 4. Enable required modules:
#    sudo a2enmod ssl headers proxy proxy_http proxy_wstunnel rewrite expires deflate
# 5. Enable the site:
#    sudo a2ensite pdf-renamer-ssl.conf
# 6. Test and reload Apache:
#    sudo apache2ctl configtest
#    sudo systemctl reload apache2
#
# PREREQUISITE: The HTTP VirtualHost in apache-pdf-renamer-enhanced.conf must also be
# updated to redirect HTTP traffic to HTTPS. See that file for instructions.

<VirtualHost *:443>
    ServerName YOUR_DOMAIN
    ServerAdmin admin@YOUR_DOMAIN
    DocumentRoot /var/www/html

    # =================================================================
    # SSL Engine and Certificate Paths (Let's Encrypt)
    # =================================================================
    # Enable SSL processing for this VirtualHost
    SSLEngine on

    # Let's Encrypt certificate files (replace YOUR_DOMAIN with your domain)
    SSLCertificateFile      /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem

    # =================================================================
    # TLS Protocol and Cipher Configuration (Mozilla Intermediate)
    # =================================================================
    # Disable legacy SSL and early TLS versions (SSLv3, TLS 1.0, TLS 1.1 are
    # vulnerable to POODLE, BEAST, and SWEET32 attacks)
    SSLProtocol             all -SSLv3 -TLSv1 -TLSv1.1

    # Cipher suite from Mozilla SSL Configuration Generator (Intermediate profile)
    # Ordered by preference: AES-GCM suites first (AEAD), then ChaCha20-Poly1305
    SSLCipherSuite          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305

    # Prefer server cipher order over client preference
    # This ensures the server's stronger ciphers are used regardless of client preference
    SSLHonorCipherOrder     off

    # Disable SSL session tickets to improve forward secrecy
    # (Session tickets can leak session keys if the ticket encryption key is compromised)
    SSLSessionTickets       off

    # =================================================================
    # OCSP Stapling (Performance Optimization)
    # =================================================================
    # Staple the OCSP response to the TLS handshake, eliminating the need for
    # the client to separately contact the CA's OCSP server. This reduces
    # handshake latency and improves privacy.
    SSLUseStapling          On

    # Cache for stapled OCSP responses - shared across all VirtualHosts
    # Declared at global/server level; define once in ssl.conf or here if not elsewhere:
    # SSLStaplingCache        shmcb:/var/run/ocsp(128000)
    #
    # NOTE: SSLStaplingCache must be declared at the server level (outside VirtualHost),
    # not inside VirtualHost. Add the following line to /etc/apache2/mods-enabled/ssl.conf
    # if it is not already present:
    #   SSLStaplingCache shmcb:${APACHE_RUN_DIR}/stapling_cache(128000)

    # Responder timeout for fetching OCSP responses (seconds)
    SSLStaplingResponderTimeout 5

    # Return a "try later" response to clients if OCSP is unavailable
    # (prevents serving stale or invalid stapling data)
    SSLStaplingReturnResponderErrors off

    # =================================================================
    # SSL Session Cache
    # =================================================================
    # Shared memory session cache for TLS session resumption
    # Format: shmcb:<path>(<size in bytes>)
    # 512000 bytes holds approximately 2000 sessions
    SSLSessionCache         shmcb:${APACHE_RUN_DIR}/ssl_scache(512000)

    # Session timeout (seconds) - 1 day is standard for intermediate profile
    SSLSessionCacheTimeout  86400

    # =================================================================
    # Reverse Proxy Configuration
    # =================================================================
    # Mirror of HTTP VirtualHost proxy rules - all traffic is routed to the
    # Gunicorn backend running on 127.0.0.1:5000

    # Preserve the original Host header for proper URL generation
    ProxyPreserveHost On

    # Inform the backend that it is mounted under /pdf-renamer so Flask can
    # generate correct URLs (request.script_root, url_for, download links, etc.)
    RequestHeader set X-Forwarded-Prefix "/pdf-renamer"

    # Communicate HTTPS to the backend so Flask generates https:// URLs
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    # Exclude static files from the proxy (served directly by Apache below)
    ProxyPass /pdf-renamer/static !

    # Proxy all other /pdf-renamer requests to the Flask backend
    ProxyPass /pdf-renamer http://localhost:5000/ retry=0 timeout=300 connectiontimeout=5
    ProxyPassReverse /pdf-renamer http://localhost:5000/

    # Proxy WebSocket connections for Socket.IO (upgraded to WSS by Apache)
    ProxyPass /pdf-renamer/socket.io ws://localhost:5000/socket.io retry=0

    # =================================================================
    # Static Files - Serve Directly from Apache
    # =================================================================
    # Bypass the proxy for static assets to reduce backend load and
    # improve performance via Apache's efficient static file serving.

    # NOTE: Update this path to match your deployment directory.
    Alias /pdf-renamer/static /opt/pdf-renamer/frontend/static

    <Directory /opt/pdf-renamer/frontend/static>
        Options FollowSymLinks
        AllowOverride None
        Require all granted

        # Enable aggressive caching for static files (immutable hashed content)
        <IfModule mod_expires.c>
            ExpiresActive On
            ExpiresByType text/css "access plus 1 year"
            ExpiresByType application/javascript "access plus 1 year"
            ExpiresByType application/json "access plus 1 year"
            ExpiresByType image/png "access plus 1 year"
            ExpiresByType image/jpg "access plus 1 year"
            ExpiresByType image/jpeg "access plus 1 year"
            ExpiresByType image/gif "access plus 1 year"
            ExpiresByType image/webp "access plus 1 year"
            ExpiresByType image/x-icon "access plus 1 year"
            ExpiresByType image/svg+xml "access plus 1 year"
            ExpiresByType font/woff "access plus 1 year"
            ExpiresByType font/woff2 "access plus 1 year"
            ExpiresByType application/font-woff "access plus 1 year"
            ExpiresByType application/font-woff2 "access plus 1 year"
        </IfModule>

        # Long-lived cache headers for static assets
        <IfModule mod_headers.c>
            Header set Cache-Control "public, max-age=31536000, immutable"
        </IfModule>
    </Directory>

    # =================================================================
    # Compression (mod_deflate)
    # =================================================================
    # Compress text content for faster transfer over HTTPS
    # (TLS overhead is partially offset by compression savings)
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css
        AddOutputFilterByType DEFLATE application/javascript application/json
        AddOutputFilterByType DEFLATE text/xml application/xml application/xml+rss
        BrowserMatch ^Mozilla/4 gzip-only-text/html
        BrowserMatch ^Mozilla/4\.0[678] no-gzip
        BrowserMatch \bMSIE !no-gzip !gzip-only-text/html
        Header append Vary User-Agent
    </IfModule>

    # =================================================================
    # Security Headers
    # =================================================================
    <LocationMatch "/pdf-renamer">
        # Protect against clickjacking attacks
        Header always set X-Frame-Options "SAMEORIGIN"

        # Prevent MIME type sniffing (content type confusion attacks)
        Header always set X-Content-Type-Options "nosniff"

        # Legacy XSS protection header (belt-and-suspenders with CSP)
        Header always set X-XSS-Protection "1; mode=block"

        # Control referrer information in cross-origin requests
        Header always set Referrer-Policy "strict-origin-when-cross-origin"

        # Content Security Policy (restrict resource loading origins)
        Header always set Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob:; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' ws: wss:; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline';"

        # HTTP Strict Transport Security (HSTS)
        # Instructs browsers to only connect via HTTPS for the next 1 year (31536000 seconds).
        # includeSubDomains: applies to all subdomains of YOUR_DOMAIN.
        # WARNING: Do NOT enable preload without first submitting to the HSTS preload list
        # (https://hstspreload.org). Removing a domain from the preload list is difficult.
        Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains" always

        # Remove server identification headers to reduce information disclosure
        Header unset Server
        Header always unset X-Powered-By
    </LocationMatch>

    # =================================================================
    # WebSocket Support for Socket.IO
    # =================================================================
    # Upgrade HTTP/1.1 connections to WebSocket for Socket.IO transport.
    # Over HTTPS, clients will connect via WSS (WebSocket Secure).
    RewriteEngine On

    # Rewrite WebSocket upgrade requests to the backend ws:// endpoint
    # (Apache handles the SSL termination; backend receives plain ws://)
    RewriteCond %{REQUEST_URI} ^/pdf-renamer/socket.io [NC]
    RewriteCond %{QUERY_STRING} transport=websocket [NC]
    RewriteRule ^/pdf-renamer/(.*)$ ws://localhost:5000/$1 [P,L]

    # =================================================================
    # Request Limits (Security)
    # =================================================================
    # Mirror of HTTP config limits to enforce consistent upload restrictions
    LimitRequestBody 104857600
    LimitXMLRequestBody 1048576

    # =================================================================
    # Logging
    # =================================================================
    # Separate log files for SSL VirtualHost to simplify monitoring and
    # avoid mixing HTTP and HTTPS access records
    ErrorLog  ${APACHE_LOG_DIR}/pdf-renamer-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/pdf-renamer-ssl-access.log combined

    # =================================================================
    # Error Pages
    # =================================================================
    ErrorDocument 404 "/pdf-renamer/error/404"
    ErrorDocument 500 "/pdf-renamer/error/500"
    ErrorDocument 502 "/pdf-renamer/error/502"
    ErrorDocument 503 "/pdf-renamer/error/503"
</VirtualHost>

# =====================================================================
# NOTES:
# =====================================================================
#
# 1. SSLStaplingCache must be configured at the server level (outside VirtualHost).
#    Add the following line to /etc/apache2/mods-enabled/ssl.conf if absent:
#      SSLStaplingCache shmcb:${APACHE_RUN_DIR}/stapling_cache(128000)
#
# 2. After enabling this configuration, verify:
#    - sudo apache2ctl configtest
#    - sudo systemctl status apache2
#    - curl -I https://YOUR_DOMAIN/pdf-renamer/
#    - openssl s_client -connect YOUR_DOMAIN:443 -tls1_2
#
# 3. Test HSTS and cipher suites with:
#    - https://www.ssllabs.com/ssltest/analyze.html?d=YOUR_DOMAIN
#    - https://securityheaders.com/?q=YOUR_DOMAIN
#
# 4. Monitor logs:
#    - tail -f /var/log/apache2/pdf-renamer-ssl-error.log
#    - tail -f /var/log/apache2/pdf-renamer-ssl-access.log
#
# 5. Certificate renewal:
#    - sudo certbot renew --dry-run
#    - Automatic renewal runs twice daily via systemd timer (certbot.timer)
#
# 6. Reference:
#    - Mozilla SSL Configuration Generator: https://ssl-config.mozilla.org/
#    - Let's Encrypt documentation: https://letsencrypt.org/docs/
