[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    unit: Unit tests
    integration: Integration tests
    security: Security tests
    auth: Authentication tests
    admin: Admin tests
    upload: Upload endpoint tests
    e2e: End-to-end browser tests (skip by default - require PLAYWRIGHT_SKIP=0 to run)
asyncio_mode = auto
