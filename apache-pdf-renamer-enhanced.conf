# Apache Virtual Host Configuration for Research PDF File Renamer (Enhanced)
# Path-based access: http://YOUR_SERVER_IP/pdf-renamer
#
# INSTALLATION:
# 1. Copy this file to /etc/apache2/sites-available/apache-pdf-renamer.conf
# 2. Enable required modules:
#    sudo a2enmod proxy proxy_http proxy_wstunnel rewrite headers expires deflate
# 3. Enable the site:
#    sudo a2ensite apache-pdf-renamer.conf
# 4. Disable default site if needed:
#    sudo a2dissite 000-default.conf
# 5. Reload Apache:
#    sudo systemctl reload apache2

<VirtualHost *:80>
    ServerAdmin admin@localhost
    DocumentRoot /var/www/html

    # =================================================================
    # Reverse Proxy Configuration
    # =================================================================
    # Strip /pdf-renamer prefix when forwarding to backend
    # http://localhost:5000/pdf-renamer -> http://localhost:5000/ (on backend)

    # Preserve the original Host header for proper URL generation
    ProxyPreserveHost On

    # Proxy configuration with timeouts
    ProxyPass /pdf-renamer http://localhost:5000/ retry=0 timeout=300 connectiontimeout=5
    ProxyPassReverse /pdf-renamer http://localhost:5000/

    # Proxy WebSocket connections for Socket.IO
    ProxyPass /pdf-renamer/socket.io ws://localhost:5000/socket.io retry=0

    # =================================================================
    # Static Files - Serve directly from Apache
    # =================================================================
    # Don't proxy static files - serve them directly for better performance
    ProxyPass /pdf-renamer/static !

    Alias /pdf-renamer/static /home/juhur/PROJECTS/ResearchPDFFileRenamerGLM/frontend/static

    <Directory /home/juhur/PROJECTS/ResearchPDFFileRenamerGLM/frontend/static>
        Options FollowSymLinks
        AllowOverride None
        Require all granted

        # Enable aggressive caching for static files (immutable content)
        <IfModule mod_expires.c>
            ExpiresActive On
            ExpiresByType text/css "access plus 1 year"
            ExpiresByType application/javascript "access plus 1 year"
            ExpiresByType application/json "access plus 1 year"
            ExpiresByType image/png "access plus 1 year"
            ExpiresByType image/jpg "access plus 1 year"
            ExpiresByType image/jpeg "access plus 1 year"
            ExpiresByType image/gif "access plus 1 year"
            ExpiresByType image/webp "access plus 1 year"
            ExpiresByType image/x-icon "access plus 1 year"
            ExpiresByType image/svg+xml "access plus 1 year"
            ExpiresByType font/woff "access plus 1 year"
            ExpiresByType font/woff2 "access plus 1 year"
            ExpiresByType application/font-woff "access plus 1 year"
            ExpiresByType application/font-woff2 "access plus 1 year"
        </IfModule>

        # Add Cache-Control headers
        <IfModule mod_headers.c>
            Header set Cache-Control "public, max-age=31536000, immutable"
        </IfModule>
    </Directory>

    # =================================================================
    # Compression (mod_deflate)
    # =================================================================
    # Compress text content for faster transfer
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css
        AddOutputFilterByType DEFLATE application/javascript application/json
        AddOutputFilterByType DEFLATE text/xml application/xml application/xml+rss
        BrowserMatch ^Mozilla/4 gzip-only-text/html
        BrowserMatch ^Mozilla/4\.0[678] no-gzip
        BrowserMatch \bMSIE !no-gzip !gzip-only-text/html
        Header append Vary User-Agent
    </IfModule>

    # =================================================================
    # Security Headers (Enhanced)
    # =================================================================
    <LocationMatch "/pdf-renamer">
        # Protect against clickjacking
        Header always set X-Frame-Options "SAMEORIGIN"

        # Prevent MIME type sniffing
        Header always set X-Content-Type-Options "nosniff"

        # Enable XSS protection
        Header always set X-XSS-Protection "1; mode=block"

        # Referrer policy
        Header always set Referrer-Policy "strict-origin-when-cross-origin"

        # Content Security Policy (restrict resource loading)
        Header always set Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob:; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' ws: wss:; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline';"

        # HSTS (only enable if using HTTPS)
        # Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains" always

        # Remove server signature
        Header unset Server
        Header always unset X-Powered-By
    </LocationMatch>

    # =================================================================
    # Request Limits (Security)
    # =================================================================
    # Limit request body size to prevent large file uploads via Apache
    # (Flask handles its own limits, this is an additional safety net)
    LimitRequestBody 104857600
    LimitXMLRequestBody 1048576

    # =================================================================
    # WebSocket Support for Socket.IO (Enhanced)
    # =================================================================
    # Socket.IO WebSocket connections with proper upgrade handling
    RewriteEngine On

    # WebSocket upgrade for Socket.IO
    RewriteCond %{REQUEST_URI} ^/pdf-renamer/socket.io [NC]
    RewriteCond %{QUERY_STRING} transport=websocket [NC]
    RewriteRule ^/pdf-renamer/(.*)$ ws://localhost:5000/$1 [P,L]

    # =================================================================
    # Logging
    # =================================================================
    ErrorLog ${APACHE_LOG_DIR}/pdf-renamer-error.log
    CustomLog ${APACHE_LOG_DIR}/pdf-renamer-access.log combined

    # =================================================================
    # Error Pages
    # =================================================================
    # Provide custom error pages
    ErrorDocument 404 "/pdf-renamer/error/404"
    ErrorDocument 500 "/pdf-renamer/error/500"
    ErrorDocument 502 "/pdf-renamer/error/502"
    ErrorDocument 503 "/pdf-renamer/error/503"
</VirtualHost>

# =====================================================================
# NOTES:
# =====================================================================
#
# 1. After enabling this configuration, verify:
#    - sudo apache2ctl configtest
#    - sudo systemctl status apache2
#    - curl http://localhost/pdf-renamer/
#
# 2. Monitor logs:
#    - tail -f /var/log/apache2/pdf-renamer-error.log
#    - tail -f /var/log/apache2/pdf-renamer-access.log
#
# 3. For production deployment, consider:
#    - Enabling HTTPS with Let's Encrypt (certbot)
#    - Setting up fail2ban for brute-force protection
#    - Configuring mod_security with OWASP Core Rule Set
#    - Setting up monitoring with Apache status module
#
# 4. Performance tuning:
#    - Adjust KeepAlive settings based on traffic
#    - Configure MaxRequestWorkers based on available RAM
#    - Enable HTTP/2 with mod_http2 (requires HTTPS)
#    - Consider caching with mod_cache for expensive operations
